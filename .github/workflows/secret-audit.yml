name: Weekly Secret Audit

on:
  push:
    branches: [main, develop]        # プッシュのたびにチェック
  pull_request:
    branches: [main, develop]        # PR作成時にもチェック
  schedule:
    - cron: '0 9 * * 1'              # 毎週月曜9時UTC（日本時間18時）
  workflow_dispatch:                  # 手動実行も可能

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0              # 全コミット履歴が必要

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose --redact

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.DISCORD_SUPPORT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚨 Secret Audit FAILED",
                "color": 16711680,
                "description": "Gitleaks detected potential secrets. Check GitHub Actions log immediately.",
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
              }]
            }'